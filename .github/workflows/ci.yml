name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: P3 untrusted dependency guard
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, '[P3-DEPENDENCY]')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- package.json package-lock.json)
          echo "P3_DEPENDENCY_CHANGED_FILES=${changed}"
          if [[ -n "${changed}" ]]; then
            echo "P3_DEPENDENCY_LOAD_BLOCKED=true"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: P3 dependency load probe
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, '[P3-DEPENDENCY]')
        run: |
          version=$(node -p "require('./node_modules/is-number/package.json').version")
          echo "P3_DEPENDENCY_VERSION=${version}"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
