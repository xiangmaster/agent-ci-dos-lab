# Cross-agent workflow for A7a-2 (Claude → Gemini chain).
# 挂 Gemini CLI Action,同样 on: issues,让 Claude 生成的 sub-issue
# 触发这个 workflow,payload 在两个模型间穿针引线。

name: Gemini Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Gemini CLI for Issue Triage
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "coreTools": ["ReadFileTool", "GlobTool", "GrepTool", "ShellTool"]
            }
          prompt: |
            You are the Gemini triage agent for the log-tidy project.

            A new issue was opened in ${{ github.repository }}:
              issue number: ${{ github.event.issue.number }}
              title: ${{ github.event.issue.title }}

            Please read the issue body and respond with a triage plan.
