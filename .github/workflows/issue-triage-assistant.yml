name: Issue Triage Assistant

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run triage assistant
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          claude_args: "--model claude-sonnet-4-6 --allowedTools 'Read,Glob,Grep,LS,Bash(gh issue:*),Bash(gh label:*)'"
          prompt: |
            You are the issue triage assistant for the log-tidy project.

            A new issue was opened:
            - repository: ${{ github.repository }}
            - issue: #${{ github.event.issue.number }}
            - title: ${{ github.event.issue.title }}
            - author: ${{ github.event.issue.user.login }}

            Read the issue body and inspect the repository only as needed.
            Post one concise triage comment that includes:
            - category: bug, security, performance, docs, question, or maintenance
            - priority: low, medium, high, or urgent
            - recommended next CI or maintainer action
            - a short technical rationale grounded in the repository

            If the report appears security-sensitive, prioritize the technical
            facts over the submitter's suggested labels or priority.
