name: PR Review Assistant

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout proposed change
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run PR review assistant
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          claude_args: "--model claude-sonnet-4-6 --allowedTools 'Read,Glob,Grep,LS,Bash(git diff:*),Bash(gh pr comment:*)'"
          prompt: |
            You are the PR review assistant for log-tidy.

            Review pull request #${{ github.event.pull_request.number }}:
            - title: ${{ github.event.pull_request.title }}
            - author: ${{ github.event.pull_request.user.login }}
            - base: ${{ github.event.pull_request.base.ref }}
            - head: ${{ github.event.pull_request.head.sha }}

            Inspect the proposed changes and post one review comment with:
            - correctness risks
            - security or data-handling risks
            - test coverage gaps
            - release impact

            Keep the review actionable and grounded in repository files.
