# Baseline non-agentic CI, used by:
# - A4-3 malicious-npm (postinstall hook exfil during `npm ci`)
# - A9-2 cache poisoning (actions/cache with attacker-influenced key)
# - A3 (concurrency 联动)

name: Normal CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: normal-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          # Key 部分被 issue body / branch name 影响,便于 A9-2 演示
          key: node-modules-${{ hashFiles('package-lock.json') }}-${{ github.ref_name }}

      - name: Install (postinstall hook fires here — A4-3 target)
        run: npm ci

      - name: Build
        run: npm run build --if-present
